<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script>
        function confirmSubmission(isBackButton) {
            if (isBackButton) {
                return true; // 戻るボタンの場合は確認なしで処理を続行
            }
            return confirm("登録してよろしいですか？"); // 登録時は確認ダイアログを表示
        }
    </script>
</head>
<body>
    <div class="container" style="max-width: 1000px;">
        <h2 class="m-4 text-center">衛生検査記録簿</h2>
        <form class="mb-5" method="POST" action="<?= deployURL ?>" onsubmit="return confirmSubmission(event.submitter.name === 'modoru');">
            <div class="text-center" style="margin-bottom: 20px;">
                <p style="margin-right: 20px; display: inline;"><strong>社員コード:</strong> <?= shainCode ?></p>
                <p style="margin-right: 20px; display: inline;"><strong>社員名:</strong> <?= shainName ?></p>
                <input type="hidden" name="shaincode" value="<?= shainCode ?>">
                <input type="hidden" name="shainName" value="<?= shainName ?>">
            </div>
            <div class="text-center" style="margin-top: 20px; margin-bottom: 20px;">
                <div style="text-align: left; display: inline-block; font-size: larger;">
                    <? output._ = createSanitary ?>
                </div>
            </div>
            <div class="d-flex justify-content-center" style="margin-top: 20px;">
                <button type="submit" class="btn btn-primary btn-lg" name="submit" value="true" style="margin-right: 20px;">登録</button>
                <button type="submit" class="btn btn-outline-secondary btn-lg" name="modoru" value="true">戻る</button>
            </div>
        </form>
    </div>
</body>
</html>
